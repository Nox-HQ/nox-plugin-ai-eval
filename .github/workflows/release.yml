name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # required for cosign keyless signing
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6e4e9ef07dffaedd7f44e3a21a9bd8d59c3f8 # v3.5.0

      - name: Install Syft (for SBOM)
        uses: anchore/sbom-action/download-syft@0e6ea21e90db9472a6a35bc35cea2e2d97f47651 # v0.16.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate registry entry
        run: |
          set -euo pipefail
          # Pull a release-built nox binary so we can run `plugin entry`.
          curl -sSL "https://github.com/nox-hq/nox/releases/latest/download/nox_$(curl -sSL https://api.github.com/repos/nox-hq/nox/releases/latest | jq -r .tag_name | sed 's/^v//')_linux_amd64.tar.gz" -o nox.tar.gz
          tar xzf nox.tar.gz
          ./nox plugin entry --dir . --release "${GITHUB_REF_NAME#v}" --output entry.json
          echo "::notice file=entry.json::Open a PR against nox-hq/nox to add this entry to registry-scaffold/index.json"

      - name: Upload registry entry artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-entry
          path: entry.json
          retention-days: 30
